variables:
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2
  GIT_STRATEGY: clone
  GIT_DEPTH: "20"

stages:
  - build

# GitLab Runner: Docker-in-Docker (privileged) or Kubernetes + dind.

.build-push-base:
  image: docker:27-cli
  services:
    - docker:27-dind
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  after_script:
    - docker logout "$CI_REGISTRY" || true

build-and-push-be:
  extends: .build-push-base
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH
  script:
    - export DOCKER_REGISTRY="$CI_REGISTRY_IMAGE"
    - export DOCKER_TAG="$CI_COMMIT_SHORT_SHA"
    - docker compose build
    - docker compose push user-service mission-service wallet-service api-gateway
