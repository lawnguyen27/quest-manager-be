server:
  port: 8082

spring:
  application:
    name: mission-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:db_mission}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

app:
  jwt:
    secret: changeThisToASufficientlyLongSecretKeyForHS256_1234567890abcdef
    expiration-ms: 3600000
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:your_cloud_name}
    api-key: ${CLOUDINARY_API_KEY:your_api_key}
    api-secret: ${CLOUDINARY_API_SECRET:your_api_secret}

exchange:
  services:
    wallet-service:
      url: http://wallet-service.railway.internal:8083
    user-service:
      url: http://user-service.railway.internal:8081
