# Backend: MySQL, Redis, Zookeeper + Kafka, Spring services, API gateway.
# Repo root = Maven multi-module (pom.xml here).
#
#   cp .env.example .env
#   docker compose up -d --build
#
# Gateway: http://localhost:8080/actuator/health
# Prebuilt images: set DOCKER_REGISTRY + DOCKER_TAG in .env, then:
#   docker compose pull user-service mission-service wallet-service api-gateway
#   docker compose up -d --no-build

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/be/mysql/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  user-service:
    image: ${DOCKER_REGISTRY:-myapp}/user-service:${DOCKER_TAG:-local}
    build:
      context: .
      dockerfile: deploy/be/docker/Dockerfile.spring
      args:
        SERVICE_MODULE: user-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_user?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      APP_JWT_SECRET: ${APP_JWT_SECRET:?Set APP_JWT_SECRET in .env}
      EXCHANGE_SERVICES_MISSION_SERVICE_URL: http://mission-service:8082
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "8081:8081"

  mission-service:
    image: ${DOCKER_REGISTRY:-myapp}/mission-service:${DOCKER_TAG:-local}
    build:
      context: .
      dockerfile: deploy/be/docker/Dockerfile.spring
      args:
        SERVICE_MODULE: mission-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_mission?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      EXCHANGE_SERVICES_USER_SERVICE_URL: http://user-service:8081
      EXCHANGE_SERVICES_WALLET_SERVICE_URL: http://wallet-service:8083
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "8082:8082"

  wallet-service:
    image: ${DOCKER_REGISTRY:-myapp}/wallet-service:${DOCKER_TAG:-local}
    build:
      context: .
      dockerfile: deploy/be/docker/Dockerfile.spring
      args:
        SERVICE_MODULE: wallet-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_wallet?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      EXCHANGE_SERVICES_USER_SERVICE_URL: http://user-service:8081
      EXCHANGE_SERVICES_MISSION_SERVICE_URL: http://mission-service:8082
      EXCHANGE_SERVICES_WALLET_SERVICE_URL: http://wallet-service:8083
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "8083:8083"

  api-gateway:
    image: ${DOCKER_REGISTRY:-myapp}/api-gateway:${DOCKER_TAG:-local}
    build:
      context: .
      dockerfile: deploy/be/docker/Dockerfile.spring
      args:
        SERVICE_MODULE: api-gateway
    restart: unless-stopped
    depends_on:
      - user-service
      - mission-service
      - wallet-service
    environment:
      GATEWAY_USER_SERVICE_URI: http://user-service:8081
      GATEWAY_MISSION_SERVICE_URI: http://mission-service:8082
      GATEWAY_WALLET_SERVICE_URI: http://wallet-service:8083
    ports:
      - "8080:8080"

volumes:
  mysql_data:
