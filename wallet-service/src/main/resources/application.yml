server:
  port: 8083

spring:
  application:
    name: wallet-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:db_wallet}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: wallet-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"

# Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: changeThisToASufficientlyLongSecretKeyForHS256_1234567890abcdef
    expiration-ms: 3600000
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

exchange:
  services:
    wallet-service:
      url: http://wallet-service.railway.internal:8083
    user-service:
      url: http://user-service.railway.internal:8081
    mission-service:
      url: http://mission-service.railway.internal:8082

vnpay:
  tmn-code: "OJW84Z0A" # Placeholder Sandbox TmnCode
  hash-secret: "HNSZTVFHKMUPQWRLKDXJYGNVOPQBCDEA" # Placeholder Sandbox HashSecret
  pay-url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
